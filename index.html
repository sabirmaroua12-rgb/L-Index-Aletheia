<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Index Aletheia</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <h1>L'Index Aletheia</h1>
    </header>

    <section class="quote">
        <div class="quote-container">
            <span class="quote-mark">“</span>
            <p class="quote-text">
                knowing yourself is the beginning <br>
                of all wisdom
            </p>
            <span class="quote-mark">”</span>
        </div>
        <p class="quote-author">__Socrates</p>
    </section>
    <section class="search">
        <h2>Recherche un concept...</h2>

        <div class="search-wrapper">

            <div class="search-input">
                <span class="icon">🔍</span>
                <input type="text" placeholder="recherche...">
                <button class="search-btn">Rechercher</button>
            </div>

            <div class="tags">
                <button class="tag">Existence</button>
                <button class="tag">Ethique</button>
                <button class="tag">Connaissance</button>
            </div>

        </div>
    </section>

    <section class="explore">
        <h2>Explorez la Philosophie</h2>

        <div class="cards">

            <div class="card">
                <span>180 × 276</span>
            </div>

            <div class="card">
                <span>180 × 276</span>
            </div>

            <div class="card">
                <span>180 × 276</span>
            </div>

        </div>
    </section>

    <script src="scriprt.js"></script>

</body>
</html>
